# CodeBuild buildspec for tradingagents-build.
#
# Required environment variables (set on the CodeBuild project by CDK):
#   AWS_ACCOUNT_ID           account number for the ECR URI
#   AWS_REGION               ECR + Lambda region
#   ECR_REPOSITORY           ECR repo name (tradingagents-agentcore)
#   BUILD_ARTIFACTS_BUCKET   S3 bucket where Lambda zips are uploaded
#   DATA_TOOLS_FN_NAME       Lambda function name for the data-tools MCP target
#   MEMORY_LOG_FN_NAME       Lambda function name for the memory-log MCP target
#
# AgentCore Runtime requires linux/arm64 images, so the project runs on an
# ARM64 build image with privileged mode enabled for docker buildx.

version: 0.2

env:
  variables:
    DOCKERFILE: "Dockerfile.agentcore"
    IMAGE_PLATFORM: "linux/arm64"

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python --version
      - pip install --upgrade pip

  pre_build:
    commands:
      - echo "CodeBuild started on $(date -u +%FT%TZ)"
      - echo "Logging in to Amazon ECR in $AWS_REGION"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
      - GIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION:-local}"
      - SHORT_SHA=$(echo "$GIT_SHA" | cut -c1-12)
      - echo "Building $IMAGE_URI with tags latest and $SHORT_SHA"

  build:
    commands:
      # --- Step 1: agent container image ------------------------------------
      - docker buildx create --use --name tabuilder 2>/dev/null || docker buildx use tabuilder
      - docker buildx inspect --bootstrap
      - docker buildx build
          --platform "$IMAGE_PLATFORM"
          --provenance=false
          --file "$DOCKERFILE"
          --tag "$IMAGE_URI:latest"
          --tag "$IMAGE_URI:$SHORT_SHA"
          --push
          .

      # --- Step 2: Gateway-target Lambda zips --------------------------------
      # Both Lambdas need the tradingagents package on their PYTHONPATH.
      # pip-install once, then build a zip per handler directory on top of
      # the shared layer contents.
      - echo "Building Lambda zips"
      - mkdir -p lambda_build/shared
      - pip install . --target lambda_build/shared

      - echo "Packaging data-tools Lambda"
      - rm -rf lambda_build/data_tools
      - cp -r lambda_build/shared lambda_build/data_tools
      - cp infra/lambdas/data_tools/*.py lambda_build/data_tools/
      - (cd lambda_build/data_tools && zip -qr ../data-tools.zip .)

      - echo "Packaging memory-log Lambda"
      - rm -rf lambda_build/memory_log
      - cp -r lambda_build/shared lambda_build/memory_log
      - cp infra/lambdas/memory_log/*.py lambda_build/memory_log/
      - (cd lambda_build/memory_log && zip -qr ../memory-log.zip .)

  post_build:
    commands:
      - echo "Uploading Lambda zips to s3://$BUILD_ARTIFACTS_BUCKET/lambdas/"
      - aws s3 cp lambda_build/data-tools.zip "s3://$BUILD_ARTIFACTS_BUCKET/lambdas/data-tools.zip"
      - aws s3 cp lambda_build/memory-log.zip "s3://$BUILD_ARTIFACTS_BUCKET/lambdas/memory-log.zip"

      - echo "Pointing Lambdas at the new code (best-effort; skipped if the functions do not exist yet)"
      - if aws lambda get-function --function-name "$DATA_TOOLS_FN_NAME" >/dev/null 2>&1; then
          aws lambda update-function-code --function-name "$DATA_TOOLS_FN_NAME" --s3-bucket "$BUILD_ARTIFACTS_BUCKET" --s3-key lambdas/data-tools.zip --publish > /dev/null;
          echo "Updated $DATA_TOOLS_FN_NAME";
        else
          echo "Skipping $DATA_TOOLS_FN_NAME (does not exist yet — deploy CDK stack first)";
        fi
      - if aws lambda get-function --function-name "$MEMORY_LOG_FN_NAME" >/dev/null 2>&1; then
          aws lambda update-function-code --function-name "$MEMORY_LOG_FN_NAME" --s3-bucket "$BUILD_ARTIFACTS_BUCKET" --s3-key lambdas/memory-log.zip --publish > /dev/null;
          echo "Updated $MEMORY_LOG_FN_NAME";
        else
          echo "Skipping $MEMORY_LOG_FN_NAME (does not exist yet — deploy CDK stack first)";
        fi

      - echo "Pushed $IMAGE_URI:latest and $IMAGE_URI:$SHORT_SHA"
      - printf '{"imageUri":"%s","imageTag":"%s","dataToolsZip":"s3://%s/lambdas/data-tools.zip","memoryLogZip":"s3://%s/lambdas/memory-log.zip"}\n' "$IMAGE_URI" "$SHORT_SHA" "$BUILD_ARTIFACTS_BUCKET" "$BUILD_ARTIFACTS_BUCKET" > imageDetail.json

artifacts:
  files:
    - imageDetail.json
