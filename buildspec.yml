# CodeBuild buildspec for tradingagents-build.
#
# Builds the ARM64 container image and pushes it to ECR. The same image
# serves three consumers: the AgentCore Runtime (uvicorn entrypoint),
# the data-tools Lambda (awslambdaric + infra/lambdas/data_tools),
# and the memory-log Lambda (awslambdaric + infra/lambdas/memory_log).
#
# Required environment variables (set on the CodeBuild project by CDK):
#   AWS_ACCOUNT_ID   account number for the ECR URI
#   AWS_REGION       ECR region
#   ECR_REPOSITORY   ECR repo name (tradingagents-agentcore)

version: 0.2

env:
  variables:
    DOCKERFILE: "Dockerfile.agentcore"
    IMAGE_PLATFORM: "linux/arm64"

phases:
  pre_build:
    commands:
      - echo "CodeBuild started on $(date -u +%FT%TZ)"
      - echo "Logging in to Amazon ECR in $AWS_REGION"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
      - GIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION:-local}"
      - SHORT_SHA=$(echo "$GIT_SHA" | cut -c1-12)
      - echo "Building $IMAGE_URI with tags latest and $SHORT_SHA"

  build:
    commands:
      - docker buildx create --use --name tabuilder 2>/dev/null || docker buildx use tabuilder
      - docker buildx inspect --bootstrap
      - docker buildx build
          --platform "$IMAGE_PLATFORM"
          --provenance=false
          --no-cache
          --pull
          --file "$DOCKERFILE"
          --tag "$IMAGE_URI:latest"
          --tag "$IMAGE_URI:$SHORT_SHA"
          --push
          .
      # Second image: Lambda-specific layout using the official AWS
      # Lambda Python base. The agentcore image above uses python:slim
      # which produces binaries Lambda rejects as non-executable.
      - docker buildx build
          --platform "$IMAGE_PLATFORM"
          --provenance=false
          --no-cache
          --pull
          --file Dockerfile.lambda
          --tag "$IMAGE_URI:lambda-latest"
          --tag "$IMAGE_URI:lambda-$SHORT_SHA"
          --push
          .

  post_build:
    commands:
      - echo "Pushed $IMAGE_URI:latest and $IMAGE_URI:$SHORT_SHA"
      - printf '{"imageUri":"%s","imageTag":"%s"}\n' "$IMAGE_URI" "$SHORT_SHA" > imageDetail.json

artifacts:
  files:
    - imageDetail.json
