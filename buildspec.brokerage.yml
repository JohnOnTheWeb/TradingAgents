# CodeBuild buildspec for brokerage-mcp-build.
#
# Builds the ARM64 brokerage-mcp container image and pushes it to a dedicated
# ECR repo. Unlike the main tradingagents image, this one has a single
# consumer: the Fargate brokerage-mcp sidecar service behind an internal ALB.

version: 0.2

env:
  variables:
    DOCKERFILE: "brokerage_mcp/Dockerfile"
    IMAGE_PLATFORM: "linux/arm64"

phases:
  pre_build:
    commands:
      - echo "CodeBuild started on $(date -u +%FT%TZ)"
      - echo "Logging in to Amazon ECR in $AWS_REGION"
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
      - IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
      - GIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION:-local}"
      - SHORT_SHA=$(echo "$GIT_SHA" | cut -c1-12)
      - echo "Building $IMAGE_URI with tags latest and $SHORT_SHA"

  build:
    commands:
      - docker buildx create --use --name brokerbuilder 2>/dev/null || docker buildx use brokerbuilder
      - docker buildx inspect --bootstrap
      - docker buildx build
          --platform "$IMAGE_PLATFORM"
          --provenance=false
          --file "$DOCKERFILE"
          --tag "$IMAGE_URI:latest"
          --tag "$IMAGE_URI:$SHORT_SHA"
          --push
          brokerage_mcp

  post_build:
    commands:
      - echo "Pushed $IMAGE_URI:latest and $IMAGE_URI:$SHORT_SHA"
      - printf '{"imageUri":"%s","imageTag":"%s"}\n' "$IMAGE_URI" "$SHORT_SHA" > imageDetail.json

artifacts:
  files:
    - imageDetail.json
